<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoomNet</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    
    <!-- Load Three.js dari CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay Styles */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Click through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            font-size: 24px;
            font-weight: bold;
        }

        .hud-bottom {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .weapon-display {
            width: 200px;
            height: 150px;
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
            font-size: 18px;
        }

        /* Menu Screen */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }

        .menu-title {
            font-size: 72px;
            color: #b00;
            text-shadow: 0 0 20px #f00;
            margin-bottom: 50px;
            font-weight: 900;
            letter-spacing: 5px;
        }

        .menu-btn {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 15px 40px;
            font-size: 24px;
            margin: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-transform: uppercase;
            min-width: 250px;
        }

        .menu-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        .hidden {
            display: none !important;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #0f0;
        }
        
        #crosshair::before {
            top: 9px;
            left: 0;
            width: 20px;
            height: 2px;
        }
        
        #crosshair::after {
            top: 0;
            left: 9px;
            width: 2px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Blazor will mount here, but we handle game loop manually in JS for performance -->
    </div>

    <!-- Game Canvas Container -->
    <div id="game-container"></div>
    
    <!-- Crosshair -->
    <div id="crosshair" class="hidden"></div>

    <!-- UI Layer -->
    <div id="ui-layer" class="hidden">
        <div class="hud-top">
            <div id="health-display">HEALTH: 100%</div>
            <div id="ammo-display">AMMO: 20/50</div>
        </div>
        <div class="hud-bottom">
            <div class="weapon-display" id="weapon-name">PISTOL</div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen">
        <div class="menu-title">DOOMNET</div>
        <button class="menu-btn" onclick="startGame()">New Game</button>
        <button class="menu-btn" onclick="showOptions()">Options</button>
        <button class="menu-btn" onclick="showAbout()">About</button>
        <button class="menu-btn" onclick="exitGame()">Exit</button>
    </div>

    <!-- Options Modal (Simple) -->
    <div id="options-screen" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:25;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;">
        <h2 style="color:#0f0;font-size:48px;margin-bottom:30px;">OPTIONS</h2>
        <div style="color:#fff;margin:10px;">Sensitivity: <input type="range" min="1" max="10" value="5" id="sens-slider"></div>
        <div style="color:#fff;margin:10px;">Volume: <input type="range" min="0" max="100" value="70" id="vol-slider"></div>
        <button class="menu-btn" onclick="closeOptions()" style="margin-top:30px;">Back</button>
    </div>

    <!-- About Modal -->
    <div id="about-screen" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:25;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;">
        <h2 style="color:#b00;font-size:48px;margin-bottom:20px;">ABOUT DOOMNET</h2>
        <p style="color:#fff;max-width:600px;text-align:center;line-height:1.6;">
            Created by <strong>Jacky the Code Bender</strong> from Gravicode Studios.<br>
            Built with WPF + Blazor Hybrid + Three.js<br>
            A tribute to the classic FPS genre.<br><br>
            <em>"Rip and Tear until it is done."</em>
        </p>
        <button class="menu-btn" onclick="closeAbout()" style="margin-top:30px;">Back</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(50,0,0,0.9);z-index:30;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;">
        <h1 style="color:#f00;font-size:72px;margin-bottom:20px;">GAME OVER</h1>
        <button class="menu-btn" onclick="restartGame()">Try Again</button>
        <button class="menu-btn" onclick="toMenu()">Main Menu</button>
    </div>

    <script src="_framework/blazor.webview.js" autostart="true"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
